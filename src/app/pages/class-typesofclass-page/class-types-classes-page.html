<div id="types-classes" class="classes relative z-10 w-full bg-black pt-15 pb-15">
    <div class="flex md:px-15">
        <h2 class="font-hanson font-bold text-5xl text-gold mt-auto mb-auto mx-10 w-full lg:w-110 lg:text-left text-center">Classes</h2>
        <hr class="w-full bg-white rounded-xs h-0.75 my-auto lg:block hidden">
        <img src="/images/diamond.png" alt="diamond" class="w-15 -translate-x-1 lg:block hidden">
    </div>

    <h3 class="font-hanson font-bold text-center text-white text-4xl mt-5 lg:block hidden">Types of Classes</h3>

    <div class="flex flex-wrap mt-15 justify-center">
        @for (class of classes(); track class; let i = $index) {
            <app-class-card [class]="class"></app-class-card>
        }
    </div>

    <h5 class="text-white text-3xl font-bold text-center mb-10">Book now to see available schedules</h5>
    <a routerLink="/class-booking"><button class="font-eurostile text-white font-bold p-1.5 border border-white rounded-full w-45 bg-linear-to-r from-gold to-pink-violet mx-auto block cursor-pointer">BOOK A CLASS</button></a>
</div>
