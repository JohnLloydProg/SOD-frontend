<div id="types-classes" class="classes relative z-10 w-full bg-black pt-15 pb-15">
    <div class="mt-20 justify-center items-center">
        <p class="text-center text-violet font-lexend text-base"> Academy  </p>
        <h1 class="mt-3 text-center text-white font-hanson text-4xl"> Types of <span class="text-gold"> Classes </span></h1>
    </div>


    <div class="flex flex-wrap mt-15 justify-center">
        @for (class of classes(); track class; let i = $index) {
            <app-class-card [class]="class"></app-class-card>
        }
    </div>

    <h5 class="mt-20 text-white text-3xl font-bold text-center mb-10">Book now to see available schedules</h5>
    <a routerLink="/class-booking"><button class="font-eurostile text-white font-bold p-1.5 border border-white rounded-full w-45 bg-linear-to-r from-[#8A38F5] to-[#741B9A] mx-auto block cursor-pointer hover:scale-110 transition ease-in-out duration-300">BOOK A CLASS</button></a>
</div>
