<div class="min-h-screen h-fit pt-35 bg-linear-to-t from-dark-violet to-black">
    <div class="flex md:px-15">
        <h2 class="font-hanson font-bold text-3xl md:text-5xl text-amber-50 mt-auto mb-auto mx-10 w-full lg:w-110 lg:text-left text-center">Coaches</h2>
        <hr class="w-full bg-amber-50 rounded-xs h-0.75 my-auto lg:block hidden">
        <img src="/images/cream_diamond.png" alt="diamond" class="w-15 -translate-x-1 lg:block hidden">
    </div>
    @for (coach of coaches(); track coach.id) {
        @if ($index % 2 == 0) {
            <div class="flex h-fit py-10 flex-col lg:flex-row">
                <div class="w-full lg:w-1/2 relative flex">
                    <img src="/images/coach_page/coaches_background.png" alt="design" class="absolute bottom-0 w-4/5 z-0 lg:block hidden">
                    <img src="{{coach.bio_picture}}" alt="Kervin Mendiola" class="w-1/2 lg:h-9/10 lg:w-auto mt-auto z-10 lg:ml-15 ml-auto mr-auto">
                </div>
                <div class="flex flex-col w-full lg:w-1/2 lg:px-0 px-5 lg:mt-0 mt-10">
                    <div class="content mr-auto my-auto w-full lg:w-4/5 lg:text-left text-center">
                        <h3 class="text-gold font-hanson text-3xl font-bold">{{coach.name}}</h3>
                        <h4 class="text-amber-50 font-hanson text-xl font-bold mt-10">{{coach.lessons?.join(', ')}}</h4>
                        <p class="font-open-sans text-white text-base mt-5">{{coach.bio}}</p>
                        <p class="font-hanson text-white text-xl font-bold mt-5">{{coach.motto}}</p>
                    </div>
                </div>
            </div>
        }@else {
            <div class="flex h-fit py-10 flex-col-reverse lg:flex-row">
                <div class="flex flex-col w-full lg:w-1/2 lg:px-0 px-5 lg:mt-0 mt-10">
                    <div class="content ml-auto my-auto w-full lg:w-4/5 lg:text-left text-center">
                        <h3 class="text-gold font-hanson text-3xl font-bold">{{coach.name}}</h3>
                        <h4 class="text-amber-50 font-hanson text-xl font-bold mt-10">{{coach.lessons?.join(', ')}}</h4>
                        <p class="font-open-sans text-white text-base mt-5">{{coach.bio}}</p>
                        <p class="font-hanson text-white text-xl font-bold mt-5">{{coach.motto}}</p>
                    </div>
                </div>
                <div class="w-full lg:w-1/2 relative flex">
                    <img src="/images/coach_page/coaches_background.png" alt="design" class="absolute bottom-0 right-0 w-4/5 z-0 transform rotate-180 lg:block hidden">
                    <img src="{{coach.bio_picture}}" alt="Kervin Mendiola" class="w-1/2 lg:h-9/10 lg:w-auto mt-auto z-10 lg:mr-15 ml-auto mr-auto">
                </div>
            </div>
        }
    }
</div>
