<div class="min-h-screen gap-10 px-4 sm:px-6 md:px-10 pt-24 md:pt-35 font-lexend bg-gradient-to-b from-black to-[#0E0114] flex flex-col">

    <!-- Title Section -->
    <div class="flex flex-col items-center text-center">
        <p class="text-violet text-sm sm:text-base">FAQs</p>

        <h1 class="mt-3 text-white font-hanson text-2xl sm:text-3xl md:text-4xl">
            Frequently Asked <span class="text-gold">Questions</span>
        </h1>

        <p class="mt-4 text-white font-light text-sm sm:text-base max-w-xl">
            Quick answers to help you get started with State of Dance.
        </p>
    </div>

    <!-- Category Buttons -->
    <div class="mx-auto grid grid-cols-2 sm:grid-cols-4 gap-3 sm:gap-5 w-full sm:w-10/12 lg:w-7/12">

        <button
            (click)="setActiveButton('academy')"
            [ngClass]="{
                'bg-violet text-white': activeButton() === 'academy',
                'bg-white text-black': activeButton() !== 'academy'
            }"
            class="p-2 sm:p-3 rounded-full font-bold text-sm sm:text-base hover:bg-violet hover:text-white transition-all">
            Academy
        </button>

        <button
            (click)="setActiveButton('booking')"
            [ngClass]="{
                'bg-violet text-white': activeButton() === 'booking',
                'bg-white text-black': activeButton() !== 'booking'
            }"
            class="p-2 sm:p-3 rounded-full font-bold text-sm sm:text-base hover:bg-violet hover:text-white transition-all">
            Booking
        </button>

        <button
            (click)="setActiveButton('payments')"
            [ngClass]="{
                'bg-violet text-white': activeButton() === 'payments',
                'bg-white text-black': activeButton() !== 'payments'
            }"
            class="p-2 sm:p-3 rounded-full font-bold text-sm sm:text-base hover:bg-violet hover:text-white transition-all">
            Payments
        </button>

        <button
            (click)="setActiveButton('account')"
            [ngClass]="{
                'bg-violet text-white': activeButton() === 'account',
                'bg-white text-black': activeButton() !== 'account'
            }"
            class="p-2 sm:p-3 rounded-full font-bold text-sm sm:text-base hover:bg-violet hover:text-white transition-all">
            Account
        </button>

    </div>

    <!-- Questions -->
    <div class="mb-20 mx-auto flex flex-col gap-4 sm:gap-5 w-full sm:w-10/12 lg:w-7/12 text-white">

        <div
            *ngFor="let question of questions; let i = index"
            class="p-5 sm:p-8 md:p-10 rounded-3xl sm:rounded-4xl border border-violet bg-gradient-to-b from-[#0F0016] to-[#1E002A]">

            <!-- Question -->
            <div
                class="flex justify-between items-center cursor-pointer gap-4"
                (click)="toggleQuestion(i)">

                <p class="text-sm sm:text-base md:text-lg">
                    {{ question.question }}
                </p>

                <!-- Dropdown Icon -->
                <svg
                    [ngClass]="{'rotate-180': activeQuestionIndex() === i}"
                    xmlns="http://www.w3.org/2000/svg"
                    class="h-5 w-5 text-white transition-transform duration-300 shrink-0"
                    fill="none"
                    viewBox="0 0 24 24"
                    stroke="currentColor">

                    <path
                        stroke-linecap="round"
                        stroke-linejoin="round"
                        stroke-width="2"
                        d="M19 9l-7 7-7-7"/>
                </svg>
            </div>

            <!-- Answer -->
            <div
                [ngClass]="{
                    'block': activeQuestionIndex() === i,
                    'hidden': activeQuestionIndex() !== i
                }"
                class="mt-4 text-sm sm:text-base text-white">

                <p>{{ question.answer }}</p>

            </div>

        </div>

    </div>

</div>
