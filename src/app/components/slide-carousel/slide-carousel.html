<div class="w-full h-full flex overflow-x-hidden">
    <div #targetZone class="absolute left-1/2 -translate-x-1/2 h-full w-1/3"></div>

    <div #moving class="relative will-change-transform flex my-auto px-4 sm:px-8 md:px-12 lg:px-20 left-7/10 h-fit">
        @for (coach of coaches(); track coach; let i = $index) {
            <div #coachCard class="card flex flex-col text-white mx-3 sm:mx-5 md:mx-8 lg:mx-10 w-52 sm:w-60 md:w-72 lg:w-80 shrink-0">
                <div id="img" class="relative w-full rounded-2xl z-10" [ngClass]="{'center': activeIndex() == i}">
                    <div
                        id="overlay"
                        class="opacity-50 bg-black absolute top-0 left-0 w-full h-full rounded-3xl transition-opacity duration-500 ease-in-out"
                        [ngClass]="{'center':activeIndex() == i}">
                    </div>

                    <img
                        src="{{coach.card_picture}}"
                        alt="coach {{i}}"
                        class="w-full h-auto aspect-[3/4] rounded-3xl object-cover">
                </div>

                <div class="absolute ml-3 sm:ml-4 md:ml-5 w-52 sm:w-60 md:w-72 lg:w-80 bottom-0">
                    <h4 class="font-eurostile font-bold text-lg sm:text-2xl md:text-3xl lg:text-4xl mt-2 sm:mt-3 w-40 sm:w-48 md:w-56 lg:w-60 leading-tight">
                        {{coach.name}}
                    </h4>
                    <p class="font-eurostile text-sm sm:text-base md:text-lg lg:text-xl w-52 sm:w-60 md:w-72 lg:w-80 leading-snug">
                        {{coach.lessons?.join(', ')}}
                    </p>
                </div>
            </div>
        }

        <a routerLink="/coaches">
            <div class="w-52 sm:w-60 md:w-72 lg:w-80 hover:bg-white transition-all ease-in bg-violet aspect-[3/4] rounded-2xl flex cursor-pointer shrink-0">
                <p class="font-eurostile m-auto w-fit font-bold text-sm sm:text-base md:text-lg lg:text-xl">
                    Learn more
                </p>
            </div>
        </a>
    </div>
</div>
