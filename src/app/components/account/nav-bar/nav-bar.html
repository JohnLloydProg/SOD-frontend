<div class="flex flex-col w-full h-full bg-amber-50 text-black">
    <div class="px-5">
        <img src="/images/dark_profile_icon.png" alt="Stage of Dance Logo" class="w-25 mt-5  mx-auto">
        <p class="font-lexend text-base text-center mt-3">{{state.user()?.username}}</p>
        <h2 class="font-hanson text-black font-bold text-3xl text-center my-5">My Account</h2>
    </div>
    <hr class="w-full h-0.5">
    <a [routerLink]="['', {outlets:{sidebar: 'profile'}}]"><p class="font-lexend text-base font-bold uppercase m-3">Edit My Profile</p></a>
    <hr class="w-full h-0.5">
    <a [routerLink]="['', {outlets:{sidebar: 'tickets'}}]"><p class="font-lexend text-base font-bold uppercase m-3">Tickets</p></a>
    <hr class="w-full h-0.5">
    <a [routerLink]="['', {outlets:{sidebar: 'bookings'}}]"><p class="font-lexend text-base font-bold uppercase m-3">Bookings</p></a>
    <hr class="w-full h-0.5">
    <a [routerLink]="['', {outlets:{sidebar: 'orders'}}]"><p class="font-lexend text-base font-bold uppercase m-3">Orders</p></a>
    <hr class="w-full h-0.5">
    <a [routerLink]="['', {outlets:{sidebar: 'rentals'}}]"><p class="font-lexend text-base font-bold uppercase m-3">Rentals</p></a>
    <hr class="w-full h-0.5">
    
    <button 
    class="font-eurostile font-bold text-white text-xl rounded-full bg-black uppercase py-2 mx-auto w-4/5 mb-5 mt-auto cursor-pointer"
    (click)="logout()"
    >Logout</button>
</div>
